<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>Login Admin</title>

    <style>

        body {

            font-family: Arial;

            background-color: #f4f4f4;

            text-align: center;

            padding: 50px;
        }

        form {

            background-color: white;

            width: 300px;

            margin: auto;

            padding: 20px;

            border-radius: 10px;

            box-shadow: 0px 0px 10px #ccc;
        }

        input {

            width: 90%;

            padding: 8px;

            margin-top: 10px;
        }

        button {

            margin-top: 15px;

            padding: 10px 20px;

            border: none;

            background-color: #3498db;

            color: white;

            border-radius: 5px;
        }

        .mensagem {

            color: red;

            font-weight: bold;
        }

    </style>

</head>

<body>

    <h1>
        Login Administrativo
    </h1>

    {% if mensagem %}

        <p class="mensagem">
            {{ mensagem }}
        </p>

    {% endif %}

    <form method="POST">

        <input
            type="text"
            name="usuario"
            placeholder="Usuário"
            required
        >

        <br>

        <input
            type="password"
            name="senha"
            placeholder="Senha"
            required
        >

        <br>

        <button type="submit">
            Entrar
        </button>

    </form>

</body>

</html>

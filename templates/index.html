<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBF 2026 - Cadastro</title>
    <style>

    body {

        font-family: Arial;

        text-align: center;

        background-color: #f4f4f4;

        padding: 30px;
    }

    .topo {

        margin-bottom: 30px;
    }

    h1 {

        color: #2c3e50;
    }

    h2 {

        color: #3498db;
    }

    p {

        color: #555;
    }

    .mensagem {

    color: green;

    font-weight: bold;
    }

    form {

        background-color: white;

        padding: 20px;

        border-radius: 10px;

        width: 90%;
        max-width: 400px;

        margin: auto;

        box-shadow: 0px 0px 10px #ccc;
    }

    input {

        width: 90%;

        padding: 8px;

        margin-top: 5px;

        box-sizing: border-box;
    }

    button {

        background-color: #3498db;

        color: white;

        border: none;

        padding: 10px 20px;

        border-radius: 5px;

        cursor: pointer;
    }

    button:hover {

        background-color: #2980b9;
    }

    </style>
</head>

<body>

    <div class="topo">

    <h1>🌈 EBF 2026</h1>

    <h2>
        Escola Bíblica de Férias
    </h2>

    <p>
        Todas as crianças são bem-vindas 💙
    </p>

    </div>

    <h1>Cadastro EBF</h1>

    {% if mensagem %}

    <p class="mensagem">
    {{ mensagem }}
    </p>

    {% endif %}

    <form method="POST">

        <label>Nome da criança:</label>
        <input type="text" name="nome" required>

        <br><br>

        <label>Responsável:</label>
        <input type="text" name="responsavel" required>

        <br><br>

        <label>Idade:</label>
        <input type="number" name="idade" required>

        <br><br>

        <label>Igreja:</label>
        <input type="text" name="igreja" required>

        <br><br>

        <label>Telefone:</label>
        <input type="text" name="telefone" required>

        <br><br>

        <button type="submit" required>
            Cadastrar
        </button>

    </form> 

</body>

</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Cadastro</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 30px;
        }
        form {
            background-color: white;
            width: 90%;
            max-width: 400px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
        }
        label { display: block; text-align: left; margin-top: 12px; font-weight: bold; }
        input {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            margin-top: 18px;
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
        }
        button:hover { background-color: #2980b9; }
        .voltar { display: block; margin-top: 16px; color: #3498db; }
    </style>
</head>
<body>

    <h1>Editar Cadastro</h1>

    <form method="POST">
        <label>Nome da criança:</label>
        <input type="text" name="nome" value="{{ crianca[1] }}" required>

        <label>Responsável:</label>
        <input type="text" name="responsavel" value="{{ crianca[2] }}" required>

        <label>Idade:</label>
        <input type="number" name="idade" value="{{ crianca[3] }}" min="1" max="17" required>

        <label>Igreja:</label>
        <input type="text" name="igreja" value="{{ crianca[4] }}" required>

        <label>Telefone:</label>
        <input type="tel" name="telefone" value="{{ crianca[5] }}" required>

        <button type="submit">Salvar Alterações</button>
    </form>

    <a class="voltar" href="/admin">← Voltar ao painel</a>

</body>
</html>

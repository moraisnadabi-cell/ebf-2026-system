<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Editar Cadastro
    </title>

    <style>

        body {

            font-family: Arial;

            background-color: #f4f4f4;

            text-align: center;

            padding: 30px;
        }

        form {

            background-color: white;

            width: 90%;

            max-width: 400px;

            margin: auto;

            padding: 20px;

            border-radius: 10px;

            box-shadow: 0px 0px 10px #ccc;
        }

        input {

            width: 90%;

            padding: 8px;

            margin-top: 10px;

            box-sizing: border-box;
        }

        button {

            margin-top: 20px;

            padding: 10px 20px;

            background-color: #3498db;

            color: white;

            border: none;

            border-radius: 5px;
        }

    </style>

</head>

<body>

    <h1>
        Editar Cadastro
    </h1>

    <form method="POST">

        <input
            type="text"
            name="nome"
            value="{{ crianca[0] }}"
            required
        >

        <br>

        <input
            type="text"
            name="responsavel"
            value="{{ crianca[1] }}"
            required
        >

        <br>

        <input
            type="number"
            name="idade"
            value="{{ crianca[2] }}"
            required
        >

        <br>

        <input
            type="text"
            name="igreja"
            value="{{ crianca[3] }}"
            required
        >

        <br>

        <input
            type="text"
            name="telefone"
            value="{{ crianca[4] }}"
            required
        >

        <br>

        <button type="submit">

            Salvar Alterações

        </button>

    </form>

</body>

</html>

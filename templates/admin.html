<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>
        Painel Administrativo
    </title>

    <style>

        body {

            font-family: Arial;

            background-color: #f4f4f4;

            padding: 20px;
        }

        h1 {

            color: #2c3e50;
        }

        table {

            width: 100%;

            border-collapse: collapse;

            background-color: white;
        }

        th, td {

            border: 1px solid #ccc;

            padding: 10px;

            text-align: center;
        }

        th {

            background-color: #3498db;

            color: white;
        }

        a {

            text-decoration: none;

            margin: 5px;
        }

    </style>

</head>

<body>

    <h1>
        Painel Administrativo
    </h1>

    <p>
        Total de inscritos:
        {{ total }}
    </p>

    <table>

        <tr>

            <th>ID</th>
            <th>Nome</th>
            <th>Responsável</th>
            <th>Idade</th>
            <th>Igreja</th>
            <th>Telefone</th>

        </tr>

        {% for crianca in criancas %}

        <tr>

            <td>{{ crianca[0] }}</td>
            <td>{{ crianca[1] }}</td>
            <td>{{ crianca[2] }}</td>
            <td>{{ crianca[3] }}</td>
            <td>{{ crianca[4] }}</td>
            <td>{{ crianca[5] }}</td>

            <td>
                <a href="/editar/{{ crianca[0] }}">Editar</a>
        |       <span>|</span>
                <a href="/remover/{{ crianca[0] }}">Remover</a>
            </td>

        </tr>

        {% endfor %}

    </table>

</body>

</html>
